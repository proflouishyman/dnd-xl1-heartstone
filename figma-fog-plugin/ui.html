<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Inter, sans-serif;
      font-size: 12px;
      padding: 12px;
      margin: 0;
      background: #fff;
      color: #333;
    }
    h3 { margin: 0 0 8px; font-size: 13px; }
    label { display: block; margin-bottom: 4px; color: #555; }
    input[type=number] {
      width: 60px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    .row { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
    .field { display: flex; flex-direction: column; }
    button {
      width: 100%;
      padding: 8px;
      background: #1e1e1e;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 4px;
    }
    button:hover { background: #444; }
    button.secondary {
      background: #e8e8e8;
      color: #333;
      margin-top: 6px;
    }
    button.secondary:hover { background: #d0d0d0; }
    button.danger {
      background: #c0392b;
      margin-top: 6px;
    }
    button.danger:hover { background: #a93226; }
    .hint {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    hr { border: none; border-top: 1px solid #eee; margin: 10px 0; }
  </style>
</head>
<body>
  <h3>D&D Fog of War</h3>
  <p class="hint">Select the map image on the canvas, then click "Add Fog". Click individual tiles to reveal rooms.</p>

  <div class="row">
    <div class="field">
      <label>Columns</label>
      <input type="number" id="cols" value="20" min="4" max="60">
    </div>
    <div class="field">
      <label>Rows</label>
      <input type="number" id="rows" value="20" min="4" max="60">
    </div>
    <div class="field">
      <label>Opacity %</label>
      <input type="number" id="opacity" value="90" min="40" max="100">
    </div>
  </div>

  <button id="addFog">Add Fog of War to Selection</button>
  <button class="secondary" id="revealAll">Reveal All Tiles</button>
  <button class="danger" id="removeFog">Remove All Fog</button>

  <hr>
  <p class="hint"><b>Tip:</b> After adding fog, select individual tiles and delete them to reveal areas as players explore.</p>

  <script>
    document.getElementById('addFog').onclick = () => {
      parent.postMessage({
        pluginMessage: {
          type: 'add-fog',
          cols: parseInt(document.getElementById('cols').value),
          rows: parseInt(document.getElementById('rows').value),
          opacity: parseInt(document.getElementById('opacity').value) / 100
        }
      }, '*');
    };

    document.getElementById('revealAll').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'reveal-all' } }, '*');
    };

    document.getElementById('removeFog').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'remove-fog' } }, '*');
    };
  </script>
</body>
</html>
