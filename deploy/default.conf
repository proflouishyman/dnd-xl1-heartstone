# dnd container (nginx): the D&D campaign site is retired (game session ended,
# switching GMs). dnd.haldo.org now serves a single static "Mission Accomplished"
# placeholder page for every route. No dnd-api / dnd-peer proxying.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve the placeholder image as a real asset...
    location = /missionaccomplished.webp {
        try_files $uri =404;
    }

    # ...and route everything else to the placeholder page.
    location / {
        try_files /index.html =404;
    }
}
