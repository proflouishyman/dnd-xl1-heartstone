<!DOCTYPE html>
<html lang="en">
<head>
<!-- haldo-redirect -->
<script>(function(){if(location.hostname.endsWith('github.io')){var p=location.pathname.replace(/^\/dnd-xl1-heartstone/,'');location.replace('https://dnd.haldo.org'+p+location.search+location.hash);}})();</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map 3 — The Tunnels of Death — XL-1</title>
<script src="/assets/vendor/peerjs.min.js"></script>
<style>
  :root {
    --gold:   #c9a84c;
    --dark:   #0e0d0b;
    --panel:  #1a1710;
    --border: #3a3020;
    --text:   #e8dfc8;
    --muted:  #8a7d60;
    --fog:    rgba(12,11,9,0.92);
    --green:  #27ae60;
    --red:    #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: Georgia, serif; }

  /* ── Header ── */
  header {
    background: #111008;
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 200;
    flex-wrap: wrap;
  }
  .back { color: var(--gold); text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }
  .back:hover { text-decoration: underline; }
  .header-text h1 { font-size: 16px; color: #fff; }
  .header-text p  { font-size: 11px; color: var(--muted); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: #181410;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 6px;
  }
  .tb-label { font-size: 11px; color: var(--muted); }
  button {
    padding: 5px 11px; font-size: 11px;
    border: 1px solid var(--border); border-radius: 4px;
    cursor: pointer; background: var(--panel); color: var(--text);
    transition: border-color 0.15s, background 0.15s;
    white-space: nowrap;
  }
  button:hover  { border-color: var(--gold); background: #252010; color: var(--gold); }
  button.danger { border-color: var(--red); color: var(--red); }
  button.danger:hover { background: var(--red); color: #fff; }
  #reveal-count { font-size: 11px; color: var(--muted); }

  /* ── Live session panel ── */
  .live-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 16px;
    background: #12100d;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    font-size: 12px;
  }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
  .live-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .live-dot.yellow { background: #f39c12; box-shadow: 0 0 6px #f39c12; }
  .live-dot.red { background: var(--red); }
  #live-status { color: var(--muted); font-size: 11px; }
  #conn-count { font-size: 11px; color: var(--muted); margin-left: 4px; }

  /* ── Player banner ── */
  .player-banner {
    display: none;
    align-items: center; gap: 10px;
    padding: 8px 16px;
    background: #0d1a12;
    border-bottom: 1px solid #1a3a22;
    font-size: 12px; color: #5dade2;
  }

  /* ── Map + fog ── */
  .map-outer { overflow: auto; }
  .map-wrapper {
    position: relative; display: inline-block;
    margin: 10px;
  }
  #map-img {
    display: block;
    max-width: calc(100vw - 20px);
    height: auto; user-select: none;
  }
  #fog-grid {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(26, 1fr);
    grid-template-rows:    repeat(32, 1fr);
  }
  .fog-tile {
    background: var(--fog);
    border: 1px solid rgba(255,255,255,0.03);
    cursor: pointer;
    transition: background 0.1s;
  }
  .fog-tile.revealed          { background: transparent; border-color: transparent; }
  .fog-tile:hover:not(.revealed) { background: rgba(40,30,10,0.7); }
  /* In player mode: tiles aren't interactive */
  body.player-mode .fog-tile { cursor: default; pointer-events: none; }
  /* Player view: fully opaque fog so nothing bleeds through */
  body.player-mode .fog-tile:not(.revealed) { background: rgba(12,11,9,1); }
  /* DM mode hint on revealed tiles */
  body.dm-mode .fog-tile.revealed { border: 1px dashed rgba(200,160,76,0.15); }
</style>
</head>
<body class="dm-mode">

<header>
  <a class="back" href="../index.html">← Hub</a>
  <div class="header-text">
    <h1>Map 3 — The Tunnels of Death</h1>
    <p>Dungeon Level I</p>
  </div>
</header>

<!-- DM toolbar (hidden in player mode) -->
<div class="toolbar" id="dm-toolbar">
  <span class="tb-label">Fog:</span>
  <button onclick="revealAll()">Reveal All</button>
  <button class="danger" onclick="resetFog()">Reset</button>
  <span id="reveal-count" style="margin-left:auto;"></span>
</div>

<!-- DM session status (shown while hosting) -->
<div class="live-bar" id="live-bar" style="display:none;">
  <div class="live-dot" id="live-dot"></div>
  <span id="live-status">Starting…</span>
  <span id="conn-count"></span>
</div>

<!-- Player banner (shown in player mode) -->
<div class="player-banner" id="player-banner">
  <div class="live-dot" id="player-dot"></div>
  <span id="player-status">Connecting…</span>
  <span style="margin-left:auto; font-size:11px; color:var(--muted);">Player view — DM controls the fog</span>
</div>

<div class="map-outer">
  <div class="map-wrapper">
    <img id="map-img" src="tunnels-of-death.jpg" alt="Map 3 — The Tunnels of Death" draggable="false">
    <div id="fog-grid"></div>
  </div>
</div>

<script>
  const SLUG  = 'tunnels-of-death';
  const COLS  = 26;
  const ROWS  = 32;
  const TOTAL = COLS * ROWS;
  const STORE = 'fog_' + SLUG;
  const ROOM  = 'heartstone-fog-' + SLUG;   // one fixed, link-free session per map

  // ── State ──────────────────────────────────────────────────────────────────
  let revealed    = new Set();
  let isDragging  = false;
  let dragReveal  = true;
  let peer        = null;
  let connections = [];   // DM: player connections
  let dmConn      = null; // player: connection to DM
  let retryTimer  = null; // player: pending reconnect
  let pingTimer   = null; // DM: heartbeat interval
  let lastSeen    = 0;    // player: time (ms) of last message from the DM
  let hostRetry   = null; // DM: pending host reconnect
  let playerRetry = null; // player: pending peer rebuild

  // ?dm → DM/host (draws fog); plain URL → player/viewer (auto-joins, read-only)
  const IS_DM = new URLSearchParams(location.search).has('dm');

  // PeerJS options for both roles. Besides our signaling server (peer.haldo.org)
  // we give WebRTC several STUN servers + a public TURN relay, so players behind
  // strict/symmetric NAT or CGNAT (common on home & mobile networks) can still
  // reach the DM. Without a relay those peers hang forever on "Connecting to DM…".
  const PEER_OPTS = {
    host: 'peer.haldo.org', port: 443, path: '/', secure: true, debug: 0,
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
      { urls: 'turn:openrelay.metered.ca:80',                username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443',               username: 'openrelayproject', credential: 'openrelayproject' },
      { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' },
    ] },
  };

  // ── Init ───────────────────────────────────────────────────────────────────
  function init() {
    loadState();
    buildGrid();
    if (IS_DM) hostSession(); else joinSession();
  }

  // ── Fog state ──────────────────────────────────────────────────────────────
  function loadState() {
    if (!IS_DM) return; // players get state from the DM
    try {
      const s = JSON.parse(localStorage.getItem(STORE) || 'null');
      if (Array.isArray(s)) revealed = new Set(s);
    } catch(e) {}
  }
  function saveState() {
    if (IS_DM)
      localStorage.setItem(STORE, JSON.stringify([...revealed]));
  }

  // ── Build fog grid ─────────────────────────────────────────────────────────
  function buildGrid() {
    const grid = document.getElementById('fog-grid');
    grid.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const t = document.createElement('div');
      t.className = 'fog-tile' + (revealed.has(i) ? ' revealed' : '');
      t.dataset.i = i;
      grid.appendChild(t);
    }
    updateCount();
  }

  function applyState(revealedArr) {
    revealed = new Set(revealedArr);
    document.querySelectorAll('.fog-tile').forEach(t => {
      t.classList.toggle('revealed', revealed.has(+t.dataset.i));
    });
    updateCount();
  }

  // ── Tile interaction (DM only) ─────────────────────────────────────────────
  function setTileState(i, show) {
    const changed = show ? !revealed.has(i) : revealed.has(i);
    if (!changed) return;
    show ? revealed.add(i) : revealed.delete(i);
    const el = document.querySelector('[data-i="' + i + '"]');
    if (el) el.classList.toggle('revealed', show);
    updateCount();
    broadcastTile(i, show);
  }

  function toggleTile(i) {
    setTileState(i, !revealed.has(i));
    saveState();
  }

  // Grid mouse/touch events
  const grid = document.getElementById('fog-grid');

  grid.addEventListener('mousedown', e => {
    if (!IS_DM) return;
    const t = e.target.closest('.fog-tile'); if (!t) return;
    const i = +t.dataset.i;
    isDragging = true;
    dragReveal = !revealed.has(i);
    setTileState(i, dragReveal);
    saveState();
    e.preventDefault();
  });
  grid.addEventListener('mousemove', e => {
    if (!isDragging || !IS_DM) return;
    const t = e.target.closest('.fog-tile'); if (!t) return;
    setTileState(+t.dataset.i, dragReveal);
  });
  window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; saveState(); } });

  grid.addEventListener('touchstart', e => {
    if (!IS_DM) return;
    const touch = e.touches[0];
    const t = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.fog-tile');
    if (t) { const i = +t.dataset.i; dragReveal = !revealed.has(i); setTileState(i, dragReveal); saveState(); }
    e.preventDefault();
  }, { passive: false });
  grid.addEventListener('touchmove', e => {
    if (!IS_DM) return;
    const touch = e.touches[0];
    const t = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.fog-tile');
    if (t) setTileState(+t.dataset.i, dragReveal);
    e.preventDefault();
  }, { passive: false });

  // ── DM toolbar actions ─────────────────────────────────────────────────────
  function revealAll() {
    document.querySelectorAll('.fog-tile').forEach(t => {
      const i = +t.dataset.i;
      if (!revealed.has(i)) { revealed.add(i); t.classList.add('revealed'); broadcastTile(i, true); }
    });
    updateCount(); saveState();
  }
  function resetFog() {
    if (!confirm('Reset all fog?')) return;
    revealed.clear();
    document.querySelectorAll('.fog-tile').forEach(t => t.classList.remove('revealed'));
    connections.forEach(c => { try { c.send({ type: 'state', revealed: [] }); } catch(e) {} });
    updateCount(); saveState();
  }
  function updateCount() {
    document.getElementById('reveal-count').textContent =
      revealed.size + ' / ' + TOTAL + ' revealed';
  }

  // ── Live session (DM hosts the one fixed room; no link to share) ────────────
  function hostSession() {
    document.getElementById('live-bar').style.display = 'flex';
    setDot('yellow'); setStatus('Starting session…');
    connectHost();
  }

  function connectHost() {
    if (hostRetry) { clearTimeout(hostRetry); hostRetry = null; }
    peer = new Peer(ROOM, PEER_OPTS);

    peer.on('open', () => {
      setDot('green'); setStatus('Session live — players can join');
      updateConnCount();
      if (!pingTimer) pingTimer = setInterval(pingAll, 5000);  // heartbeat so players detect drops
    });

    peer.on('connection', conn => {
      connections.push(conn);
      updateConnCount();
      conn.on('open', () => {
        // Send full current state to the newly joined player
        conn.send({ type: 'state', revealed: [...revealed] });
      });
      conn.on('close', () => {
        connections = connections.filter(c => c !== conn);
        updateConnCount();
      });
      conn.on('error', () => {
        connections = connections.filter(c => c !== conn);
        updateConnCount();
      });
    });

    peer.on('disconnected', () => {
      setDot('yellow'); setStatus('Reconnecting…');
      try { peer.reconnect(); } catch(e) { scheduleReconnectHost(2000); }
    });

    peer.on('error', err => {
      var t = err && err.type;
      if (t === 'unavailable-id') {
        // The room id is still held (a stale or other DM tab). Wait, then reclaim it.
        setDot('yellow'); setStatus('Reclaiming session…');
        scheduleReconnectHost(3000);
      } else if (t === 'network' || t === 'server-error' || t === 'socket-error' || t === 'socket-closed') {
        // Lost the signaling server (blip / restart) — rebuild and reclaim the room.
        setDot('yellow'); setStatus('Reconnecting…');
        scheduleReconnectHost(2000);
      } else {
        // Non-fatal (e.g. a player dropped mid-handshake) — keep the session up.
        updateConnCount();
      }
    });
  }

  // Tear down the current peer and re-host after a delay (single pending retry).
  function scheduleReconnectHost(delay) {
    if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }
    if (hostRetry) return;
    hostRetry = setTimeout(() => { hostRetry = null; connectHost(); }, delay);
  }

  function broadcastTile(i, show) {
    connections.forEach(c => {
      try { c.send({ type: 'tile', i, v: show }); } catch(e) {}
    });
  }

  function pingAll() {
    connections.forEach(c => {
      try { c.send({ type: 'ping' }); } catch(e) {}
    });
  }

  function setDot(color) {
    const d = document.getElementById('live-dot');
    d.className = 'live-dot ' + color;
  }
  function setStatus(msg) {
    document.getElementById('live-status').textContent = msg;
  }
  function updateConnCount() {
    const n = connections.length;
    document.getElementById('conn-count').textContent =
      n === 0 ? 'No players connected' : n + ' player' + (n === 1 ? '' : 's') + ' connected';
  }

  // ── Player mode (auto-join the fixed room; reconnect until the DM is live) ──
  function joinSession() {
    document.body.classList.replace('dm-mode', 'player-mode');
    document.getElementById('dm-toolbar').style.display  = 'none';
    document.getElementById('player-banner').style.display = 'flex';

    createPlayerPeer();

    // A DM reload/close often doesn't fire 'close' over WebRTC — detect it via the
    // DM heartbeat: if we haven't heard a ping/update in a while, re-join. If our
    // own peer died too, rebuild it from scratch.
    setInterval(() => {
      if (lastSeen && Date.now() - lastSeen > 12000) {
        lastSeen = 0;
        try { if (dmConn) dmConn.close(); } catch(e) {}
        setPlayerStatus('yellow', 'Waiting for DM…');
        if (peer && !peer.destroyed && peer.open) connectToDM();
        else schedulePlayerRecreate();
      }
    }, 4000);
  }

  // (Re)create the player peer + wire its handlers. Called on load and whenever
  // the signaling connection is lost, so a server blip/restart self-heals.
  function createPlayerPeer() {
    if (playerRetry) { clearTimeout(playerRetry); playerRetry = null; }
    setPlayerStatus('yellow', 'Connecting…');
    try { if (peer) peer.destroy(); } catch(e) {}
    peer = new Peer(PEER_OPTS);
    peer.on('open', () => connectToDM());
    peer.on('disconnected', () => {
      setPlayerStatus('yellow', 'Reconnecting…');
      try { peer.reconnect(); } catch(e) { schedulePlayerRecreate(); }
    });
    peer.on('error', err => {
      var t = err && err.type;
      if (t === 'network' || t === 'server-error' || t === 'socket-error' || t === 'socket-closed') {
        // Lost the signaling server — rebuild the peer.
        setPlayerStatus('yellow', 'Reconnecting…');
        schedulePlayerRecreate();
      } else {
        // peer-unavailable = the DM isn't hosting yet; keep retrying the data conn.
        setPlayerStatus('yellow', 'Waiting for DM…');
        scheduleRejoin();
      }
    });
  }

  function schedulePlayerRecreate() {
    if (playerRetry) return;
    playerRetry = setTimeout(() => { playerRetry = null; createPlayerPeer(); }, 3000);
  }

  function connectToDM() {
    setPlayerStatus('yellow', 'Connecting to DM…');
    dmConn = peer.connect(ROOM, { reliable: true });

    dmConn.on('open', () => {
      lastSeen = Date.now();
      setPlayerStatus('green', 'Connected — DM is revealing the map');
    });

    dmConn.on('data', data => {
      lastSeen = Date.now();
      if (data.type === 'state') {
        applyState(data.revealed);
      } else if (data.type === 'tile') {
        if (data.v) revealed.add(data.i); else revealed.delete(data.i);
        const el = document.querySelector('[data-i="' + data.i + '"]');
        if (el) el.classList.toggle('revealed', data.v);
        updateCount();
      }
    });

    dmConn.on('close', () => {
      setPlayerStatus('yellow', 'Waiting for DM…');
      scheduleRejoin();
    });
    dmConn.on('error', () => {
      setPlayerStatus('yellow', 'Waiting for DM…');
      scheduleRejoin();
    });
  }

  function scheduleRejoin() {
    if (retryTimer) return;            // don't stack timers
    retryTimer = setTimeout(() => {
      retryTimer = null;
      if (peer && !peer.destroyed) connectToDM();
    }, 3000);
  }

  function setPlayerStatus(color, msg) {
    document.getElementById('player-dot').className = 'live-dot ' + color;
    document.getElementById('player-status').textContent = msg;
  }

  init();
</script>
</body>
</html>
