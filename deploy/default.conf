# dnd container (nginx): serve the static site, proxy /api/ + the realtime
# WebSocket to the dnd-api sidecar on the shared docker network.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST + WebSocket → dnd-api. The hostname is resolved lazily via Docker's
    # embedded DNS (variable upstream + resolver) so nginx still starts and
    # serves the static site even if dnd-api is temporarily down. The rewrite
    # strips the /api prefix:  /api/characters/foo → dnd-api:8000/characters/foo
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $dnd_api dnd-api;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$dnd_api:8000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 20m;
    }

    # Character sheets: serve the static id file (e.g. /characters/kelek.html)
    # directly; if it doesn't exist, treat the path as a vanity slug (a renamed
    # character) and let dnd-api resolve it back to the real sheet via an
    # X-Accel-Redirect — so /characters/<new-name>.html is reload-safe without
    # baking the big sheet HTML into the api image.
    location /characters/ {
        try_files $uri @resolve_char;
    }
    location @resolve_char {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $dnd_api dnd-api;
        proxy_pass http://$dnd_api:8000/resolve$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Internal target for the X-Accel-Redirect above (not directly reachable).
    location /_sheet/ {
        internal;
        alias /usr/share/nginx/html/characters/;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
